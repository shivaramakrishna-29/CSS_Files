<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .circle{
            height: 100px;
            width: 100px;
            border-radius: 50%;
            background-color: blue;
            color: aliceblue;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;

            /* starts the animation */
            /* jam = animation name */
            /* 1.5s = animation runs for 1.5 seconds */
            /* ease-in = starts slow and becomes fast */
            /* infinite = repeats again and again */
            animation: jam 1.5s ease-in infinite;
        }

        @keyframes jam{

            /* starting position */
            0%{
                top: 0px;
            }

            /* middle of animation */
            /* circle moves down */
            /* text color changes */
            /* circle also moves right and rotates */
            50%{
                top: 180px;
                color: black;
                transform: translate(50px) rotate(140deg);
            }

            /* ending position */
            /* circle comes back to top */
            100%{
                top: 0px;
            }
        }
    </style>
</head>
<body>

    <div>
        <p class="circle">gol</p>
    </div>
    
</body>
</html>
